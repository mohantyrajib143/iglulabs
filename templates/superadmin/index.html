{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
    <meta name="description" content="IgluLabs Software Pvt. Ltd.">
    <meta name="keywords" content="IgluLabs Software Pvt. Ltd.">
    <meta name="author" content="IgluLabs Software Pvt. Ltd.">
    <meta name="robots" content="noindex, nofollow">
    <title>IgluLabs Software Pvt. Ltd.</title>
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'superadmin/favicons/iglulabs.png' %}">
    <link rel="stylesheet" href="{% static 'superadmin/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'superadmin/css/font-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'superadmin/css/style.css' %}">
</head>
<body class="account-page">
    <div class="main-wrapper">
        <div class="account-content">
            <div class="container">
                <div class="account-box" style="margin-top: 20%;">
                    <div class="account-wrapper">
                        <h3 class="account-title">IgluLabs Software Pvt. Ltd.</h3>
                        <p class="account-subtitle">Login to access dashboard</p>
                        <form action="">
                            <div class="form-group">
                                <label>Email Address</label>
                                <input class="form-control" type="text" placeholder="e.g. example@iglulabs.com" required="">
                            </div>
                            <div class="form-group">
                                <div class="row">
                                    <div class="col">
                                        <label>Password</label>
                                    </div>
                                    <div class="col-auto">
                                        <a class="text-muted" href="">
                                            Forgot password?
                                        </a>
                                    </div>
                                </div>
                                <div class="position-relative">
                                    <input class="form-control" type="password" id="password" placeholder="**********" required="">
                                    <span class="fa fa-eye-slash" id="toggle-password"></span>
                                </div>
                            </div>
                            <div class="form-group text-center">
                                <button class="btn btn-primary account-btn" type="submit">Login</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="{% static 'superadmin/js/js-jquery-3.6.0.min.js' %}"></script>
    <script src="{% static 'superadmin/js/js-bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'superadmin/js/js-app.js' %}"></script>
</body>
</html>
